<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0F0F14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230F0F14'/%3E%3Cpath d='M32 10c2 8-6 12-6 20a10 10 0 0 0 20 0c0-5-3-8-4-12-4 3-3 6-3 9a4 4 0 0 1-8 0c0-7 8-9 1-17z' fill='%237A00E6'/%3E%3Cellipse cx='32' cy='50' rx='11' ry='3' fill='%237A00E6' opacity='.35'/%3E%3C/svg%3E">
<title>Braise</title>
<style>
  /* MODIFIÉ (Changement 1) : palette enrichie — corail secondaire, gradient signature, ombres douces */
  :root{
    --bg:#0F0F14; --panel:#17171F; --panel-2:#1E1E29;
    --txt:#E5E5EA; --muted:#8A8A97; --accent:#7A00E6;
    --accent-soft:rgba(122,0,230,.16);
    --coral:#FF6B5C; --coral-soft:rgba(255,107,92,.14);
    --ok:#22C55E; --warn:#F59E0B;
    --grad:linear-gradient(120deg,#7A00E6 0%,#A94DFF 60%,#FF6B5C 135%);
    --shadow:0 6px 22px rgba(0,0,0,.38), 0 1px 3px rgba(0,0,0,.45);
    --ease:cubic-bezier(.2,.7,.3,1);
    --radius:14px;
  }
  *{box-sizing:border-box; margin:0; -webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    /* MODIFIÉ (Changement 1) : deux halos très discrets (violet en haut, corail en bas) cassent l'aplat */
    background:
      radial-gradient(140% 55% at 50% -12%, rgba(122,0,230,.10) 0%, transparent 60%),
      radial-gradient(90% 40% at 88% 112%, rgba(255,107,92,.05) 0%, transparent 60%),
      var(--bg);
    color:var(--txt);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    font-size:16px; line-height:1.45;
    display:flex; flex-direction:column;
    max-width:520px; margin:0 auto;
    padding:env(safe-area-inset-top) 0 0;
  }
  main{flex:1; overflow-y:auto; padding:16px 16px 90px}

  /* ---- entête : logo + XP ---- */
  header{display:flex; align-items:center; gap:10px; padding:14px 16px 4px}
  header svg{flex:none}
  .brand{font-weight:800; letter-spacing:.14em; text-transform:uppercase; font-size:.95rem}
  .lvl{margin-left:auto; text-align:right; font-size:.78rem; color:var(--muted)}
  .lvl b{color:var(--txt); font-variant-numeric:tabular-nums}
  /* MODIFIÉ (Changement 1) : gradient violet→corail + lueur */
  .xpbar{height:7px; background:var(--panel-2); border-radius:4px; margin:8px 16px 0; overflow:hidden; box-shadow:inset 0 1px 2px rgba(0,0,0,.5)}
  .xpbar i{display:block; height:100%; background:var(--grad); border-radius:4px; transition:width .28s var(--ease); box-shadow:0 0 10px rgba(122,0,230,.55)}
  .title-lvl{padding:4px 16px 0; font-size:.75rem; color:var(--accent); letter-spacing:.06em}

  h2{font-size:.72rem; text-transform:uppercase; letter-spacing:.16em; color:var(--muted); margin:26px 0 8px 2px}
  /* NOUVEAU (Changement 1) : la date échappe au style "étiquette" pour casser la grille uniforme */
  h2.date{font-size:1.15rem; text-transform:capitalize; letter-spacing:0; color:var(--txt); font-weight:800; margin:6px 0 2px}
  /* MODIFIÉ (Changement 1) : relief doux — micro-gradient, bordure fine, ombre portée */
  .card{
    background:linear-gradient(180deg,#1B1B25 0%,var(--panel) 100%);
    border:1px solid rgba(255,255,255,.055);
    border-radius:var(--radius); padding:4px 0; overflow:hidden;
    box-shadow:var(--shadow);
  }

  /* ---- lignes cochables ---- */
  /* MODIFIÉ (Changement 1) : transitions 200-260ms, retour tactile, streak corail */
  .row{display:flex; align-items:center; gap:12px; padding:13px 14px; border-bottom:1px solid rgba(255,255,255,.04); cursor:pointer; user-select:none; transition:background .22s var(--ease), transform .2s var(--ease)}
  .row:active{transform:scale(.985); background:rgba(255,255,255,.03)}
  .row:last-child{border-bottom:none}
  .chk{flex:none; width:24px; height:24px; border-radius:8px; border:2px solid var(--muted); display:grid; place-items:center; font-size:14px; color:transparent; transition:all .24s var(--ease)}
  .row.done .chk{background:var(--accent); border-color:var(--accent); color:#fff; box-shadow:0 0 12px rgba(122,0,230,.5)}
  .row.done .name{color:var(--muted); text-decoration:line-through}
  .name{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .cat-dot{flex:none; width:8px; height:8px; border-radius:50%; box-shadow:0 0 6px currentColor}
  .streak{flex:none; font-size:.82rem; color:var(--coral); font-variant-numeric:tabular-nums}
  .badge{flex:none; font-size:.68rem; background:var(--coral-soft); color:var(--coral); padding:2px 8px; border-radius:99px}
  .joker-tag{flex:none; font-size:.72rem; color:var(--accent)}

  /* ---- ajout rapide ---- */
  .quickadd{display:flex; gap:8px; margin-top:8px}
  .quickadd input{flex:1; background:var(--panel); border:1px solid var(--panel-2); color:var(--txt); border-radius:var(--radius); padding:12px 14px; font-size:1rem; outline:none}
  .quickadd input:focus{border-color:var(--accent)}

  /* ---- clôture / victoire ---- */
  /* MODIFIÉ (Changement 1) : bordure en gradient (technique double background) + ombre */
  .closure{
    background:linear-gradient(var(--panel),var(--panel)) padding-box, var(--grad) border-box;
    border:1px solid transparent;
    border-radius:var(--radius); padding:20px 16px; margin-top:26px; text-align:center;
    box-shadow:var(--shadow);
  }
  .closure label{display:block; font-size:.8rem; color:var(--muted); margin:14px 0 4px}
  .closure output{font-size:1.3rem}
  input[type=range]{width:100%; accent-color:var(--accent)}
  .victory{text-align:center; padding:52px 20px}
  /* MODIFIÉ (Changement 1) : halo corail sous la flamme */
  .victory .flame{font-size:60px; animation:pulse 2.2s ease-in-out infinite; filter:drop-shadow(0 6px 22px rgba(255,107,92,.45))}
  @keyframes pulse{50%{transform:scale(1.12); filter:brightness(1.25) drop-shadow(0 6px 26px rgba(255,107,92,.6))}}
  @media (prefers-reduced-motion:reduce){.victory .flame{animation:none} .xpbar i{transition:none}}
  .victory h1{font-size:1.5rem; margin:16px 0 6px; letter-spacing:-.01em}
  .victory p{color:var(--muted)}

  /* ---- boutons ---- */
  button{font:inherit; cursor:pointer; border:none; border-radius:var(--radius)}
  /* MODIFIÉ (Changement 1) : gradient signature + relief + retour tactile */
  .btn{background:var(--grad); color:#fff; padding:13px 24px; font-weight:700; box-shadow:0 4px 16px rgba(122,0,230,.35); transition:transform .2s var(--ease), box-shadow .2s var(--ease)}
  .btn:active{transform:scale(.96); box-shadow:0 2px 8px rgba(122,0,230,.3)}
  .btn-ghost{background:var(--panel-2); color:var(--txt); padding:9px 14px; font-size:.85rem; border:1px solid rgba(255,255,255,.05); transition:background .2s var(--ease)}
  .btn-ghost:active{background:#262633}
  .btn-mini{background:none; color:var(--muted); padding:4px 8px; font-size:.8rem}
  .btn-mini:hover{color:var(--txt)}

  /* ---- stats ---- */
  /* MODIFIÉ (Changement 1) : chiffre-clé en dégradé (background-clip:text) */
  .big-num{font-size:2.9rem; font-weight:800; background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent; font-variant-numeric:tabular-nums}
  .stat-block{background:linear-gradient(180deg,#1B1B25,var(--panel)); border:1px solid rgba(255,255,255,.055); border-radius:var(--radius); padding:18px 16px; margin-bottom:12px; text-align:center; box-shadow:var(--shadow)}

  /* NOUVEAU (Changement 2) : écran de sélection de profil + pavé PIN */
  body.locked header, body.locked main, body.locked nav,
  body.locked .timer, body.locked .xpbar, body.locked .title-lvl{display:none}
  .lock{position:fixed; inset:0; z-index:5; background:
        radial-gradient(120% 55% at 50% -10%, rgba(122,0,230,.14) 0%, transparent 60%), var(--bg);
        display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; padding:24px}
  .lock .brand{font-size:1.05rem}
  .profiles{display:flex; flex-wrap:wrap; gap:20px; justify-content:center; max-width:340px}
  .profile-item{text-align:center; font-size:.82rem; color:var(--muted); width:86px; cursor:pointer}
  .avatar{width:74px; height:74px; border-radius:24px; margin:0 auto 7px; display:grid; place-items:center;
          font-size:1.8rem; font-weight:800; color:#fff; box-shadow:var(--shadow);
          transition:transform .2s var(--ease)}
  .profile-item:active .avatar{transform:scale(.93)}
  .pin-dots{display:flex; gap:16px}
  .pin-dots i{width:14px; height:14px; border-radius:50%; border:2px solid var(--muted); transition:all .2s var(--ease)}
  .pin-dots i.on{background:var(--accent); border-color:var(--accent); box-shadow:0 0 10px rgba(122,0,230,.6)}
  .pin-msg{min-height:22px; color:var(--coral); font-size:.85rem}
  .keypad{display:grid; grid-template-columns:repeat(3,74px); gap:12px}
  .keypad button{height:64px; border-radius:20px; background:var(--panel-2); color:var(--txt);
                 font-size:1.35rem; font-weight:600; border:1px solid rgba(255,255,255,.05);
                 transition:transform .18s var(--ease), background .18s var(--ease)}
  .keypad button:active{transform:scale(.92); background:#2A2A38}
  .lock-input{background:var(--panel); border:1px solid var(--panel-2); color:var(--txt);
              border-radius:var(--radius); padding:13px 16px; font-size:1.05rem; outline:none;
              text-align:center; width:230px}
  .lock-input:focus{border-color:var(--accent)}

  /* NOUVEAU (Suggestions) : lignes du catalogue d'habitudes suggérées */
  .sugg{cursor:pointer}
  .sugg input{display:none}
  .sugg input:checked ~ .chk{background:var(--accent); border-color:var(--accent); color:#fff; box-shadow:0 0 12px rgba(122,0,230,.5)}
  .sugg .name, .row .name.wrap{white-space:normal; line-height:1.3}
  .sugg .name small, .row .name small{display:block; color:var(--muted); font-size:.74rem; font-weight:400}
  .sugg-badge{flex:none; font-size:.64rem; background:var(--accent-soft); color:#B980FF; padding:2px 8px; border-radius:99px; letter-spacing:.04em}
  .reassign-panel{background:var(--coral-soft); padding:12px 14px; display:flex; flex-direction:column; gap:8px; font-size:.85rem}
  .reassign-panel select{background:var(--panel-2); border:none; color:var(--txt); border-radius:10px; padding:9px 12px; font-size:.9rem}
  .stat-block small{color:var(--muted)}
  .stat-row{display:flex; justify-content:space-between; padding:11px 14px; border-bottom:1px solid rgba(255,255,255,.04); font-size:.92rem}
  .stat-row:last-child{border-bottom:none}
  .stat-row span:last-child{color:var(--warn); font-variant-numeric:tabular-nums}

  /* ---- réglages ---- */
  form.mini{display:flex; flex-direction:column; gap:8px; background:var(--panel); border-radius:var(--radius); padding:14px; margin-bottom:12px}
  form.mini input[type=text], form.mini select{background:var(--panel-2); border:none; color:var(--txt); border-radius:10px; padding:10px 12px; font-size:.95rem; outline:none}
  .days{display:flex; gap:5px; flex-wrap:wrap}
  .days label{flex:1; text-align:center; font-size:.72rem; background:var(--panel-2); border-radius:8px; padding:7px 0; cursor:pointer; color:var(--muted)}
  .days input{display:none}
  .days input:checked+span{color:var(--accent); font-weight:700}
  .cat-line{display:flex; align-items:center; gap:10px; padding:9px 14px; border-bottom:1px solid rgba(255,255,255,.04)}
  input[type=color]{width:30px; height:30px; border:none; background:none; padding:0; cursor:pointer}

  /* ---- navigation 3 onglets ---- */
  nav{position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:520px;
      display:flex; background:rgba(15,15,20,.92); backdrop-filter:blur(10px);
      border-top:1px solid var(--panel-2); padding-bottom:env(safe-area-inset-bottom)}
  nav button{flex:1; background:none; color:var(--muted); padding:12px 0 10px; font-size:.72rem; letter-spacing:.06em; border-radius:0}
  nav button.active{color:var(--accent); font-weight:700}
  nav button span{display:block; font-size:1.15rem; margin-bottom:2px}

  .timer{position:fixed; bottom:66px; left:50%; transform:translateX(-50%); font-size:.7rem; color:var(--muted); opacity:.75}

  .toast{position:fixed; top:14px; left:50%; transform:translateX(-50%); background:var(--accent); color:#fff;
         padding:10px 18px; border-radius:99px; font-size:.85rem; font-weight:600; opacity:0; pointer-events:none;
         transition:opacity .25s; z-index:9; white-space:nowrap}
  .toast.show{opacity:1}
  .empty{color:var(--muted); text-align:center; padding:28px 10px; font-size:.9rem}
  .hidden{display:none!important}
</style>
</head>
<body>

<header>
  <!-- Logo Braise : flamme minimaliste, aussi utilisé comme icône PWA dans le manifest -->
  <svg width="30" height="30" viewBox="0 0 64 64" aria-hidden="true">
    <rect width="64" height="64" rx="14" fill="#17171F"/>
    <path d="M32 10c2 8-6 12-6 20a10 10 0 0 0 20 0c0-5-3-8-4-12-4 3-3 6-3 9a4 4 0 0 1-8 0c0-7 8-9 1-17z" fill="#7A00E6"/>
    <ellipse cx="32" cy="50" rx="11" ry="3" fill="#7A00E6" opacity=".35"/>
  </svg>
  <span class="brand">Braise</span>
  <span class="lvl">Niveau <b id="lvlNum">1</b><br><span id="xpTxt">0 XP</span></span>
</header>
<div class="xpbar"><i id="xpFill" style="width:0%"></i></div>
<div class="title-lvl" id="lvlTitle"></div>

<main id="view"></main>

<div class="timer" id="appTimer">⏱ 0 min dans l'app aujourd'hui</div>
<div class="toast" id="toast"></div>

<!-- NOUVEAU (Changement 2) : écran profils / PIN, rempli dynamiquement par renderLock() -->
<div id="lock" class="lock hidden"></div>

<nav>
  <button data-tab="today" class="active"><span>🔥</span>Aujourd'hui</button>
  <button data-tab="stats"><span>📊</span>Stats</button>
  <button data-tab="settings"><span>⚙️</span>Réglages</button>
</nav>

<script>
"use strict";
/* ================= DONNÉES ================= */
// MODIFIÉ (Changement 2) : la clé devient dynamique, préfixée par l'identifiant du profil
// connecté ("braise_user_<id>_data"). Elle est définie par unlock() après saisie du PIN.
let KEY = null;
const TITLES = ["Étincelle","Apprenti discipliné","Allumeur de braises","Régulier du matin",
  "Machine à cocher","Moine du Pomodoro","Gardien de la flamme","Forgeron d'habitudes",
  "Braise éternelle","Légende incandescente"];

// MODIFIÉ (Changement 2) : les données ne sont plus chargées au démarrage mais par unlock()
let D = null;

function load(){
  try{ const d = JSON.parse(localStorage.getItem(KEY)); if(d && d.meta) return d; }catch(e){}
  return {
    meta:{ version:1, xp:0, level:1, lastJokerWeek:null, appTime:{date:null, seconds:0} },
    habits:[], tasks:[],
    categories:[
      {id:"perso",  name:"Perso",  color:"#7A00E6"},
      {id:"sante",  name:"Santé",  color:"#22C55E"},
      {id:"travail",name:"Travail",color:"#F59E0B"}
    ],
    history:{}
  };
}
// MODIFIÉ (Changement 2) : garde-fou — pas d'écriture tant qu'aucun profil n'est déverrouillé
const save = () => { if(KEY && D) localStorage.setItem(KEY, JSON.stringify(D)); };

/* ================= DATES ================= */
const pad = n => String(n).padStart(2,"0");
const dkey = d => d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
const today = () => dkey(new Date());
function addDays(k, n){ const [y,m,d] = k.split("-").map(Number); const dt = new Date(y, m-1, d+n); return dkey(dt); }
function dayOfWeek(k){ const [y,m,d] = k.split("-").map(Number); return new Date(y, m-1, d).getDay(); }
// Lundi de la semaine courante — sert de clé pour la remise à zéro hebdomadaire des jokers
function mondayKey(d){ const x = new Date(d); const diff = (x.getDay()+6)%7; x.setDate(x.getDate()-diff); return dkey(x); }

function histFor(k){
  if(!D.history[k]) D.history[k] = { completedHabits:[], completedTasks:[], jokeredHabits:[], mood:null, energy:null, xpEarned:0 };
  if(!D.history[k].jokeredHabits) D.history[k].jokeredHabits = []; // extension du schéma pour tracer les jokers
  return D.history[k];
}

/* Une habitude est-elle prévue tel jour ? */
function isDue(h, k){
  if(h.archived) return false;
  if(h.createdAt && k < h.createdAt) return false;
  if(h.schedule.type === "daily") return true;
  // NOUVEAU (Suggestions) : type "monthly" — prévue le jour du mois indiqué (défaut : le 1er).
  // Extension minimale du schéma, nécessaire pour les suggestions mensuelles (revue budget/portefeuille).
  if(h.schedule.type === "monthly") return +k.split("-")[2] === (h.schedule.days[0] || 1);
  return (h.schedule.days || []).includes(dayOfWeek(k)); // weekdays et weekly : mêmes règles, jours cochés
}

/* ================= ROLLOVER (au chargement) ================= */
function rollover(){
  const T = today();

  // 1. Report des tâches non faites : date -> aujourd'hui, compteur "reportée ×N"
  D.tasks.forEach(t => { if(!t.done && t.date < T){ t.date = T; t.postponedCount++; } });
  // Purge des tâches faites vieilles de +60 jours (l'historique garde la trace)
  D.tasks = D.tasks.filter(t => !(t.done && t.date < addDays(T,-60)));

  // 2. Remise à zéro hebdomadaire des jokers (chaque lundi)
  const wk = mondayKey(new Date());
  if(D.meta.lastJokerWeek !== wk){
    D.meta.lastJokerWeek = wk;
    D.habits.forEach(h => h.jokerUsedThisWeek = false);
  }

  /* 3. Audit des streaks.
     Pour chaque habitude, on parcourt les jours PLANIFIÉS depuis le dernier audit
     jusqu'à hier. Jour planifié non coché :
       - joker hebdo disponible -> consommé automatiquement, streak sauvé (façon
         "streak freeze" Duolingo), le jour est marqué dans history.jokeredHabits ;
       - sinon -> streak remis à 0.
     Le streak stocké reste ainsi cohérent avec l'historique, source de vérité. */
  const from = D.meta.lastAudit || T;
  for(let k = from; k < T; k = addDays(k,1)){
    D.habits.forEach(h => {
      if(!isDue(h,k)) return;
      const H = histFor(k);
      if(H.completedHabits.includes(h.id) || H.jokeredHabits.includes(h.id)) return;
      if(h.streak > 0 && !h.jokerUsedThisWeek){
        h.jokerUsedThisWeek = true;
        H.jokeredHabits.push(h.id);
        toast("🃏 Joker utilisé : streak « "+h.name+" » sauvé");
      } else {
        h.streak = 0;
      }
    });
  }
  D.meta.lastAudit = T;

  // 4. Compteur de temps dans l'app : remise à zéro si nouveau jour
  if(D.meta.appTime.date !== T){ D.meta.appTime = { date:T, seconds:0 }; }
  save();
}

/* ================= XP & NIVEAUX ================= */
const multiplier = s => s <= 7 ? 1 : s <= 30 ? 1.5 : 2;
// Seuil cumulé du niveau N : 100 × N^1.5 XP
const xpForLevel = n => Math.round(100 * Math.pow(n, 1.5));
function levelFromXp(xp){ let n = 1; while(xp >= xpForLevel(n)) n++; return n; }
const titleFor = lvl => TITLES[Math.min(lvl-1, TITLES.length-1)];

function addXp(delta){
  const before = D.meta.level;
  D.meta.xp = Math.max(0, D.meta.xp + delta);
  histFor(today()).xpEarned += delta;
  D.meta.level = levelFromXp(D.meta.xp);
  if(D.meta.level > before) toast("⬆️ Niveau "+D.meta.level+" — "+titleFor(D.meta.level)+" !");
  renderXpBar();
}
function renderXpBar(){
  const lvl = D.meta.level;
  const lo = lvl === 1 ? 0 : xpForLevel(lvl-1);
  const hi = xpForLevel(lvl);
  const pct = Math.min(100, Math.round((D.meta.xp - lo) / (hi - lo) * 100));
  document.getElementById("lvlNum").textContent = lvl;
  document.getElementById("xpTxt").textContent = D.meta.xp+" / "+hi+" XP";
  document.getElementById("xpFill").style.width = pct+"%";
  document.getElementById("lvlTitle").textContent = titleFor(lvl);
}

/* ================= ACTIONS ================= */
const uid = p => p+"_"+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const catOf = id => D.categories.find(c => c.id === id) || {color:"#8A8A97", name:"?"};

function toggleHabit(id){
  const h = D.habits.find(x => x.id === id);
  const H = histFor(today());
  const i = H.completedHabits.indexOf(id);
  if(i >= 0){
    // décocher : on retire exactement l'XP qui avait été gagnée (même multiplicateur)
    H.completedHabits.splice(i,1);
    addXp(-Math.round(10 * multiplier(h.streak)));
    h.streak = Math.max(0, h.streak - 1);
  } else {
    h.streak++;
    h.bestStreak = Math.max(h.bestStreak || 0, h.streak);
    H.completedHabits.push(id);
    addXp(Math.round(10 * multiplier(h.streak)));
  }
  save(); renderToday();
}

function toggleTask(id){
  const t = D.tasks.find(x => x.id === id);
  const H = histFor(today());
  t.done = !t.done;
  if(t.done){ H.completedTasks.push(id); addXp(10); }
  else{ H.completedTasks = H.completedTasks.filter(x => x !== id); addXp(-10); }
  save(); renderToday();
}

function addTask(name){
  D.tasks.push({ id:uid("t"), name, date:today(), done:false, postponedCount:0 });
  save(); renderToday();
}

/* ================= VUE : AUJOURD'HUI ================= */
const view = document.getElementById("view");
const esc = s => s.replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function renderToday(){
  const T = today(), H = histFor(T);
  const due = D.habits.filter(h => isDue(h, T));
  const tasks = D.tasks.filter(t => t.date === T);
  const allDone = (due.length + tasks.length) > 0 &&
                  due.every(h => H.completedHabits.includes(h.id)) &&
                  tasks.every(t => t.done);

  const dateLabel = new Date().toLocaleDateString("fr-FR", {weekday:"long", day:"numeric", month:"long"});
  // MODIFIÉ (Changement 1) : classe .date pour le style éditorial de l'en-tête de journée
  let html = `<h2 class="date">${dateLabel}</h2>`;

  if(allDone && H.mood !== null){
    html += `<div class="victory"><div class="flame">🔥</div>
      <h1>Journée pliée.</h1><p>Va vivre. L'app te retrouve demain matin.</p>
      <p style="margin-top:14px">+${H.xpEarned} XP aujourd'hui</p></div>`;
    view.innerHTML = html; return;
  }

  // Habitudes du jour
  html += `<h2>Habitudes</h2><div class="card">`;
  if(due.length === 0) html += `<div class="empty">Aucune habitude prévue aujourd'hui.<br>Ajoute-en dans ⚙️ Réglages.</div>`;
  due.forEach(h => {
    const done = H.completedHabits.includes(h.id);
    const jok = H.jokeredHabits.includes(h.id);
    html += `<div class="row ${done?"done":""}" onclick="toggleHabit('${h.id}')">
      <span class="chk">✓</span>
      <span class="cat-dot" style="background:${catOf(h.category).color}"></span>
      <span class="name">${esc(h.name)}</span>
      ${jok?`<span class="joker-tag">🃏</span>`:""}
      <span class="streak">🔥 ${h.streak}</span></div>`;
  });
  html += `</div>`;

  // Tâches du jour
  html += `<h2>Tâches du jour</h2><div class="card">`;
  if(tasks.length === 0) html += `<div class="empty">Rien de ponctuel aujourd'hui.</div>`;
  tasks.forEach(t => {
    html += `<div class="row ${t.done?"done":""}" onclick="toggleTask('${t.id}')">
      <span class="chk">✓</span><span class="name">${esc(t.name)}</span>
      ${t.postponedCount>0?`<span class="badge">reportée ×${t.postponedCount}</span>`:""}</div>`;
  });
  html += `</div>
    <div class="quickadd"><input id="newTask" type="text" placeholder="+ Ajouter une tâche, puis Entrée" enterkeyhint="done"></div>`;

  // Clôture de journée : tout est coché mais humeur/énergie pas encore saisies
  if(allDone && H.mood === null){
    html += `<div class="closure">
      <strong>Tout est coché 👏 — clôture en 5 secondes</strong>
      <label>Humeur <output id="moodOut">😐</output></label>
      <input type="range" id="mood" min="1" max="5" value="3">
      <label>Énergie <output id="energyOut">🔋🔋🔋</output></label>
      <input type="range" id="energy" min="1" max="5" value="3">
      <button class="btn" style="margin-top:16px" onclick="closeDay()">Clôturer la journée</button>
    </div>`;
  }
  view.innerHTML = html;

  const inp = document.getElementById("newTask");
  if(inp) inp.addEventListener("keydown", e => {
    if(e.key === "Enter" && inp.value.trim()){ addTask(inp.value.trim()); }
  });
  const moods = ["😞","🙁","😐","🙂","😄"];
  const m = document.getElementById("mood"), en = document.getElementById("energy");
  if(m){
    m.oninput = () => document.getElementById("moodOut").textContent = moods[m.value-1];
    en.oninput = () => document.getElementById("energyOut").textContent = "🔋".repeat(en.value);
  }
}

function closeDay(){
  const H = histFor(today());
  H.mood = +document.getElementById("mood").value;
  H.energy = +document.getElementById("energy").value;
  save(); renderToday();
}

/* ================= VUE : STATS (V1) ================= */
function renderStats(){
  // Taux de complétion des habitudes sur les 7 derniers jours
  // (dénominateur = jours planifiés d'après les schedules actuels)
  let due = 0, done = 0;
  for(let i = 6; i >= 0; i--){
    const k = addDays(today(), -i);
    const H = D.history[k];
    D.habits.forEach(h => {
      if(isDue(h,k)){ due++; if(H && (H.completedHabits.includes(h.id) || (H.jokeredHabits||[]).includes(h.id))) done++; }
    });
  }
  const rate = due ? Math.round(done/due*100) : 0;

  let html = `<h2>7 derniers jours</h2>
    <div class="stat-block"><div class="big-num">${rate}%</div><small>de complétion des habitudes (${done}/${due})</small></div>
    <h2>Streaks</h2><div class="card">`;
  const act = D.habits.filter(h => !h.archived);
  if(act.length === 0) html += `<div class="empty">Aucune habitude encore.</div>`;
  act.forEach(h => {
    html += `<div class="stat-row"><span>${esc(h.name)}</span><span>🔥 ${h.streak} <small style="color:var(--muted)">/ record ${h.bestStreak||0}</small></span></div>`;
  });
  html += `</div>
    <p class="empty" style="font-size:.78rem">V2 à venir : heatmap annuelle · corrélations humeur/énergie × complétion</p>`;
  // TODO V2 : heatmap 365 jours en CSS Grid à partir de D.history
  // TODO V2 : double courbe énergie/complétion sur 30 jours (Chart.js en CDN, seule dépendance tolérée)
  view.innerHTML = html;
}

// NOUVEAU (Changement 3) : identifiant de l'habitude en cours d'édition (null = mode création)
let editingHabitId = null;

// NOUVEAU (Changement 3) : pré-remplit le formulaire avec les valeurs actuelles de l'habitude
function editHabit(id){
  const h = D.habits.find(x => x.id === id);
  editingHabitId = id;
  document.getElementById("hName").value = h.name;
  document.getElementById("hCat").value = h.category;
  document.getElementById("hType").value = h.schedule.type;
  // MODIFIÉ (Suggestions) : le sélecteur de jours reste masqué aussi pour le type mensuel
  document.getElementById("hDays").classList.toggle("hidden", h.schedule.type === "daily" || h.schedule.type === "monthly");
  document.querySelectorAll("#hDays input").forEach(i => i.checked = (h.schedule.days || []).includes(+i.value));
  document.getElementById("hSubmitBtn").textContent = "Enregistrer les modifications";
  document.querySelector("main").scrollTop = 0;
  document.getElementById("hName").focus();
}

function submitHabit(e){
  e.preventDefault();
  const type = document.getElementById("hType").value;
  const days = [...document.querySelectorAll("#hDays input:checked")].map(i => +i.value);
  // MODIFIÉ (Suggestions) : la validation des jours ne concerne que weekdays/weekly ;
  // monthly stocke [1] (le 1er du mois), daily stocke []
  if((type === "weekdays" || type === "weekly") && days.length === 0){ toast("Choisis au moins un jour"); return false; }
  const schedule = { type, days: type === "daily" ? [] : type === "monthly" ? [1] : days };
  // MODIFIÉ (Changement 3) : en mode édition, mise à jour ciblée de name/category/schedule
  // uniquement — streak, bestStreak, createdAt, jokerUsedThisWeek et l'historique
  // ne sont jamais touchés, pour ne pas fausser les streaks calculés.
  if(editingHabitId){
    const h = D.habits.find(x => x.id === editingHabitId);
    h.name = document.getElementById("hName").value.trim();
    h.category = document.getElementById("hCat").value;
    h.schedule = schedule; // MODIFIÉ (Suggestions) : schedule calculé plus haut (gère monthly)
    editingHabitId = null;
    save(); renderSettings(); toast("Habitude modifiée ✓");
    return false;
  }
  D.habits.push({
    id:uid("h"), name:document.getElementById("hName").value.trim(),
    category:document.getElementById("hCat").value,
    schedule, // MODIFIÉ (Suggestions) : schedule calculé plus haut (gère monthly)
    streak:0, bestStreak:0, jokerUsedThisWeek:false, archived:false, createdAt:today()
  });
  save(); renderSettings(); toast("Habitude ajoutée 🔥");
  return false;
}
function archiveHabit(id){ D.habits.find(h=>h.id===id).archived = true; save(); renderSettings(); }
function deleteHabit(id){ if(confirm("Supprimer définitivement ? (l'historique est conservé)")){ D.habits = D.habits.filter(h=>h.id!==id); save(); renderSettings(); } }
// NOUVEAU (Édition catégories) : identifiants d'état — catégorie en cours d'édition / de réassignation
let editingCatId = null;
let reassigningCatId = null;

// NOUVEAU (Édition catégories) : pré-remplit le formulaire catégorie (nom + couleur)
function editCat(id){
  const c = D.categories.find(x => x.id === id);
  editingCatId = id;
  document.getElementById("cName").value = c.name;
  document.getElementById("cColor").value = c.color;
  document.getElementById("cSubmitBtn").textContent = "Enregistrer la catégorie";
  document.getElementById("cName").focus();
}

function submitCat(e){
  e.preventDefault();
  const name = document.getElementById("cName").value.trim();
  // MODIFIÉ (Édition catégories) : en mode édition, seule l'apparence (nom/couleur) change —
  // les habitudes gardent leur categoryId, l'affichage se met à jour partout ;
  // aucune donnée d'historique ni de streak n'est affectée.
  if(editingCatId){
    const c = D.categories.find(x => x.id === editingCatId);
    c.name = name;
    c.color = document.getElementById("cColor").value;
    editingCatId = null;
    save(); renderSettings(); toast("Catégorie modifiée ✓");
    return false;
  }
  D.categories.push({ id:uid("c"), name, color:document.getElementById("cColor").value });
  save(); renderSettings();
  return false;
}
function editCatColor(id,v){ D.categories.find(c=>c.id===id).color = v; save(); }
// MODIFIÉ (Édition catégories) : plus de blocage sec — si des habitudes sont rattachées,
// un panneau propose de les réassigner vers une autre catégorie ou d'annuler
// (jamais de suppression en cascade silencieuse).
function deleteCat(id){
  const used = D.habits.filter(h => h.category === id).length;
  if(used > 0){
    if(D.categories.length < 2){ toast("Crée d'abord une autre catégorie pour réassigner"); return; }
    reassigningCatId = id;
    renderSettings();
    return;
  }
  D.categories = D.categories.filter(c=>c.id!==id); save(); renderSettings();
}
// NOUVEAU (Édition catégories) : réassigne les habitudes puis supprime la catégorie
function confirmReassign(id){
  const target = document.getElementById("reassignTo").value;
  D.habits.forEach(h => { if(h.category === id) h.category = target; });
  D.categories = D.categories.filter(c => c.id !== id);
  reassigningCatId = null;
  save(); renderSettings(); toast("Habitudes réassignées, catégorie supprimée ✓");
}
// NOUVEAU (Édition catégories)
function cancelReassign(){ reassigningCatId = null; renderSettings(); }

function exportJson(){
  const blob = new Blob([JSON.stringify(D, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "braise-backup-"+today()+".json";
  a.click(); URL.revokeObjectURL(a.href);
}
function importJson(input){
  const f = input.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = () => {
    try{
      const d = JSON.parse(r.result);
      if(!d.meta || !d.habits) throw 0;
      // MODIFIÉ (Changement 2) : l'import écrit dans la clé du profil connecté (KEY dynamique)
      D = d; save(); rollover(); renderXpBar(); showTab("today"); toast("Backup restauré ✓");
    }catch(e){ toast("Fichier invalide"); }
  };
  r.readAsText(f);
}

  let html = `<h2 class="date">Suggestions d'habitudes</h2>
  <p style="color:var(--muted); font-size:.85rem; margin:4px 2px 0">Coche celles qui te parlent — rien n'est ajouté sans ton accord. Une fois ajoutée, chaque habitude devient une habitude normale, modifiable ou supprimable dans les réglages.</p>`;
  SUGGESTED_CATEGORIES.forEach(c => {
    html += `<h2><span class="cat-dot" style="background:${c.color}; display:inline-block; margin-right:6px"></span>${esc(c.name)}</h2><div class="card">`;
    SUGGESTED_HABITS.forEach((s, idx) => {
      if(s.cat !== c.id) return;
      // Le badge "Suggéré" disparaît une fois l'habitude ajoutée (détection par nom identique)
      const already = D.habits.some(h => !h.archived && h.name === s.name);
      if(already){
        html += `<div class="row done" style="cursor:default"><span class="chk">✓</span>
          <span class="name wrap">${esc(s.name)}<small>${esc(s.desc)}</small></span></div>`;
      } else {
        html += `<label class="row sugg"><input type="checkbox" class="sugg-chk" data-i="${idx}">
          <span class="chk">✓</span>
          <span class="name wrap">${esc(s.name)}<small>${esc(s.desc)}</small></span>
          <span class="sugg-badge">Suggéré</span></label>`;
      }
    });
    html += `</div>`;
  });
  html += `<div style="display:flex; gap:10px; margin-top:20px">
    <button class="btn" style="flex:1" onclick="addSelectedSuggestions()">Ajouter la sélection</button>
    <button class="btn-ghost" style="flex:1" onclick="showTab('today')">Passer</button>
  </div>`;
  view.innerHTML = html;
  document.querySelector("main").scrollTop = 0;
}

// NOUVEAU (Suggestions) : ajout des habitudes cochées — mêmes champs qu'une création manuelle
function addSelectedSuggestions(){
  const checked = [...document.querySelectorAll(".sugg-chk:checked")].map(i => SUGGESTED_HABITS[+i.dataset.i]);
  if(checked.length === 0){ toast("Coche au moins une habitude (ou Passer)"); return; }
  checked.forEach(s => {
    // La catégorie du catalogue n'est créée que si une habitude sélectionnée en a besoin
    if(!D.categories.some(c => c.id === s.cat)){
      D.categories.push({ ...SUGGESTED_CATEGORIES.find(c => c.id === s.cat) });
    }
    D.habits.push({
      id:uid("h"), name:s.name, category:s.cat,
      schedule:{ type:s.schedule.type, days:[...s.schedule.days] },
      streak:0, bestStreak:0, jokerUsedThisWeek:false, archived:false, createdAt:today()
    });
  });
  save();
  toast(checked.length + " habitude(s) ajoutée(s) 🔥");
  showTab("today");
}

/* ================= NOUVEAU (Changement 2) : PROFILS MULTI-UTILISATEURS ================= */
const PROFILES_KEY = "braise_profiles";   // registre des profils (nom, couleur, hash du PIN)
const LEGACY_KEY   = "braise_v1";         // ancienne clé mono-utilisateur, migrée au 1er profil
const AVATAR_COLORS = ["#7A00E6","#FF6B5C","#22C55E","#F59E0B","#3B82F6","#EC4899"];
const lockEl = document.getElementById("lock");
let currentProfile = null;
let pin = { mode:null, buffer:"", profileId:null, name:null, firstEntry:null };

const getProfiles  = () => JSON.parse(localStorage.getItem(PROFILES_KEY) || "[]");
const saveProfiles = p  => localStorage.setItem(PROFILES_KEY, JSON.stringify(p));
const dataKeyFor   = id => "braise_user_" + id + "_data";

// Hachage SHA-256 du PIN (crypto.subtle, jamais stocké en clair) — même approche que LingoPilot
async function sha256(str){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,"0")).join("");
}

function renderLock(){
  const profiles = getProfiles();
  let html = `
    <svg width="54" height="54" viewBox="0 0 64 64" aria-hidden="true">
      <rect width="64" height="64" rx="14" fill="#17171F"/>
      <path d="M32 10c2 8-6 12-6 20a10 10 0 0 0 20 0c0-5-3-8-4-12-4 3-3 6-3 9a4 4 0 0 1-8 0c0-7 8-9 1-17z" fill="#7A00E6"/>
      <ellipse cx="32" cy="50" rx="11" ry="3" fill="#7A00E6" opacity=".35"/>
    </svg>
    <span class="brand">Braise</span>
    <div class="profiles">`;
  profiles.forEach(p => {
    html += `<div class="profile-item" onclick="openKeypad('login','${p.id}')">
      <div class="avatar" style="background:${p.color}">${esc(p.name[0].toUpperCase())}</div>${esc(p.name)}</div>`;
  });
  html += `<div class="profile-item" onclick="startCreateProfile()">
      <div class="avatar" style="background:var(--panel-2); color:var(--muted)">+</div>Créer un profil</div>
    </div>`;
  lockEl.innerHTML = html;
  lockEl.classList.remove("hidden");
  document.body.classList.add("locked");
}

function startCreateProfile(){
  lockEl.innerHTML = `
    <span class="brand">Nouveau profil</span>
    <input type="text" id="pName" class="lock-input" maxlength="14" placeholder="Ton prénom" autocomplete="off">
    <button class="btn" onclick="nameNext()">Continuer</button>
    <button class="btn-mini" onclick="renderLock()">← Retour</button>`;
  document.getElementById("pName").focus();
}
function nameNext(){
  const n = document.getElementById("pName").value.trim();
  if(!n){ toast("Entre un prénom"); return; }
  pin = { mode:"create", buffer:"", name:n, firstEntry:null };
  renderKeypad();
}

function openKeypad(mode, profileId){
  const p = profileId ? getProfiles().find(x => x.id === profileId) : null;
  // Verrouillage temporaire : 5 échecs -> 30 s de blocage, persisté (recharger ne le contourne pas)
  if(mode === "login" && p.lockUntil && p.lockUntil > Date.now()){
    toast("Profil bloqué encore " + Math.ceil((p.lockUntil - Date.now())/1000) + " s (5 échecs)");
    return;
  }
  pin = { mode, buffer:"", profileId, name:null, firstEntry:null };
  renderKeypad();
}

function renderKeypad(msg){
  const p = pin.profileId ? getProfiles().find(x => x.id === pin.profileId) : null;
  const titles = {
    login:  "Code PIN — " + (p ? esc(p.name) : ""),
    create: "Choisis un code PIN à 4 chiffres",
    confirm:"Confirme ton code PIN",
    delete: "Saisis le PIN pour supprimer ce profil"
  };
  let dots = ""; for(let i = 0; i < 4; i++) dots += `<i class="${i < pin.buffer.length ? "on" : ""}"></i>`;
  lockEl.innerHTML = `
    <span class="brand">${titles[pin.mode]}</span>
    <div class="pin-dots">${dots}</div>
    <div class="pin-msg">${msg || ""}</div>
    <div class="keypad">
      ${[1,2,3,4,5,6,7,8,9].map(n => `<button onclick="pressKey('${n}')">${n}</button>`).join("")}
      <button onclick="cancelKeypad()" style="font-size:.8rem">Annuler</button>
      <button onclick="pressKey('0')">0</button>
      <button onclick="pressKey('back')">⌫</button>
    </div>`;
  lockEl.classList.remove("hidden");
  document.body.classList.add("locked");
}

async function pressKey(k){
  if(k === "back"){ pin.buffer = pin.buffer.slice(0,-1); renderKeypad(); return; }
  if(pin.buffer.length >= 4) return;
  pin.buffer += k; renderKeypad();
  if(pin.buffer.length === 4) await handlePin();
}

function cancelKeypad(){
  const wasDelete = pin.mode === "delete";
  pin = { mode:null, buffer:"" };
  if(wasDelete){ lockEl.classList.add("hidden"); document.body.classList.remove("locked"); }
  else renderLock();
}

async function handlePin(){
  const hash = await sha256(pin.buffer);
  const profiles = getProfiles();

  if(pin.mode === "login"){
    const p = profiles.find(x => x.id === pin.profileId);
    if(hash === p.pinHash){ p.failCount = 0; saveProfiles(profiles); unlock(p); }
    else {
      p.failCount = (p.failCount || 0) + 1;
      if(p.failCount >= 5){
        p.lockUntil = Date.now() + 30000; p.failCount = 0; saveProfiles(profiles);
        renderLock(); toast("5 échecs — profil bloqué 30 secondes"); return;
      }
      saveProfiles(profiles);
      pin.buffer = ""; renderKeypad("Code incorrect (" + p.failCount + "/5)");
    }
  }
  else if(pin.mode === "create"){
    // Double saisie à la création : évite d'être enfermé dehors par une faute de frappe
    pin.firstEntry = pin.buffer; pin.buffer = ""; pin.mode = "confirm"; renderKeypad();
  }
  else if(pin.mode === "confirm"){
    if(pin.buffer !== pin.firstEntry){
      pin.mode = "create"; pin.buffer = ""; pin.firstEntry = null;
      renderKeypad("Les codes ne correspondent pas — recommence"); return;
    }
    const p = { id:uid("u"), name:pin.name, color:AVATAR_COLORS[profiles.length % AVATAR_COLORS.length],
                pinHash:hash, failCount:0, lockUntil:0, createdAt:today() };
    profiles.push(p); saveProfiles(profiles);
    // Migration douce : les données de l'ancienne version mono-utilisateur ("braise_v1")
    // sont adoptées par le tout premier profil créé, puis l'ancienne clé est supprimée
    if(profiles.length === 1 && localStorage.getItem(LEGACY_KEY)){
      localStorage.setItem(dataKeyFor(p.id), localStorage.getItem(LEGACY_KEY));
      localStorage.removeItem(LEGACY_KEY);
      toast("Données existantes migrées vers ton profil ✓");
    }
    unlock(p);
    // MODIFIÉ (Suggestions) : à la création d'un profil, l'écran de suggestions est
    // proposé immédiatement après le déverrouillage (l'utilisateur peut Passer)
    renderSuggestions();
  }
  else if(pin.mode === "delete"){
    if(hash !== currentProfile.pinHash){ pin.buffer = ""; renderKeypad("Code incorrect"); return; }
    // Second avertissement exigé avant toute suppression
    if(confirm("Cette action est irréversible, toutes les données seront perdues.\nSupprimer le profil « " + currentProfile.name + " » ?")){
      localStorage.removeItem(dataKeyFor(currentProfile.id));
      saveProfiles(getProfiles().filter(x => x.id !== currentProfile.id));
      currentProfile = null; D = null; KEY = null;
      pin = { mode:null, buffer:"" };
      renderLock(); toast("Profil supprimé");
    } else { cancelKeypad(); }
  }
}

function unlock(p){
  currentProfile = p;
  KEY = dataKeyFor(p.id);
  D = load();
  lockEl.classList.add("hidden");
  document.body.classList.remove("locked");
  rollover(); renderXpBar(); showTab("today");
}

function lockApp(){
  if(D) save();
  currentProfile = null; D = null; KEY = null;
  renderLock();
}

function askDeleteProfile(){
  pin = { mode:"delete", buffer:"" };
  renderKeypad();
}

/* ================= DÉMARRAGE ================= */
// MODIFIÉ (Changement 2) : l'app démarre verrouillée sur l'écran de profils ;
// rollover + rendu sont désormais déclenchés par unlock() après saisie du PIN.
renderLock();
if("serviceWorker" in navigator) navigator.serviceWorker.register("service-worker.js");
</script>
